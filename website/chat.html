<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat with StoryBoT</title>

  <style>
    /* ── Reset ────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Colour palette (matches dashboard/static/style.css) ──────────── */
    :root {
      --blob-orange:  #FF6B00;
      --blob-yellow:  #FFD600;
      --blob-pink:    #FF3C8E;
      --blob-teal:    #00C9B1;
      --blob-purple:  #7B2FBE;
      --ink:          #1A0030;
      --cream:        #FFF8E7;
      --outline:      4px solid var(--ink);
    }

    /* ── Page background + blob shapes ───────────────────────────────── */
    body {
      min-height: 100vh;
      background-color: var(--cream);
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      padding: 2rem 1rem 4rem;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
      filter: blur(2px);
      opacity: 0.45;
      pointer-events: none;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle at 35% 40%, var(--blob-orange), var(--blob-yellow));
      top: -140px; left: -160px;
    }
    body::after {
      width: 480px; height: 480px;
      background: radial-gradient(circle at 60% 55%, var(--blob-pink), var(--blob-purple));
      bottom: -140px; right: -140px;
    }

    /* ── Layout ───────────────────────────────────────────────────────── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      -webkit-text-stroke: 2px var(--ink);
      paint-order: stroke fill;
      line-height: 1.15;
      margin-bottom: 0.3rem;
    }
    header h1 span { color: var(--blob-orange); }

    header .tagline {
      font-size: 1rem;
      font-weight: 700;
      color: var(--blob-purple);
    }

    /* ── Badge ────────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      background: var(--blob-yellow);
      border: var(--outline);
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 1rem;
      margin-bottom: 0.8rem;
      box-shadow: 3px 3px 0 var(--ink);
    }

    /* ── Cards ────────────────────────────────────────────────────────── */
    .card {
      position: relative;
      background: var(--cream);
      border: var(--outline);
      border-radius: 28px;
      box-shadow: 8px 8px 0 var(--ink);
      padding: 1.8rem 1.6rem;
      margin-bottom: 1.6rem;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    /* ── Error banner ─────────────────────────────────────────────────── */
    .error-banner {
      background: var(--blob-pink);
      color: white;
      border: var(--outline);
      border-radius: 14px;
      padding: 0.7rem 1rem;
      font-weight: 800;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-banner.visible { display: block; }

    /* ── Name overlay ─────────────────────────────────────────────────── */
    #name-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(26, 0, 48, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #name-overlay.hidden { display: none; }

    .name-card {
      background: var(--cream);
      border: var(--outline);
      border-radius: 28px;
      box-shadow: 8px 8px 0 var(--ink);
      padding: 2rem 1.8rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .name-card h2 {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 0.4rem;
    }

    .name-card p {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--blob-purple);
      margin-bottom: 1.2rem;
    }

    .name-input {
      width: 100%;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 700;
      border: var(--outline);
      border-radius: 14px;
      background: white;
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      margin-bottom: 1rem;
      outline: none;
    }
    .name-input:focus {
      border-color: var(--blob-purple);
      box-shadow: 3px 3px 0 var(--blob-purple);
    }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      display: inline-block;
      background: var(--blob-orange);
      color: var(--ink);
      border: var(--outline);
      border-radius: 50px;
      padding: 0.55rem 1.4rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--ink);
      transition: transform 80ms, box-shadow 80ms;
      text-decoration: none;
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--ink);
    }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.28rem 0.8rem;
      box-shadow: 2px 2px 0 var(--ink);
    }

    .btn-teal {
      background: var(--blob-teal);
    }

    /* ── Chat interface ───────────────────────────────────────────────── */
    #chat-section { display: none; }
    #chat-section.visible { display: block; }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .chat-header h2 {
      margin-bottom: 0;
    }

    .chat-user-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .chat-username-label {
      background: var(--blob-purple);
      color: white;
      border: 2px solid var(--ink);
      border-radius: 50px;
      padding: 0.2rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 800;
      box-shadow: 2px 2px 0 var(--ink);
    }

    /* ── Message list ─────────────────────────────────────────────────── */
    #chat-messages {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 520px;
      overflow-y: auto;
      padding: 0.5rem 0.2rem;
      margin-bottom: 1.2rem;
      scroll-behavior: smooth;
    }

    .chat-msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .chat-msg--bot {
      align-self: flex-start;
    }

    .chat-msg--user {
      align-self: flex-end;
    }

    .chat-msg__label {
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--blob-purple);
      margin-bottom: 0.2rem;
    }

    .chat-msg--user .chat-msg__label {
      text-align: right;
      color: var(--blob-orange);
    }

    .chat-msg__bubble {
      padding: 0.6rem 0.9rem;
      border: 2px solid var(--ink);
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 3px 3px 0 var(--ink);
      line-height: 1.4;
    }

    .chat-msg--bot .chat-msg__bubble {
      background: rgba(0, 201, 177, 0.14);
      border-radius: 4px 14px 14px 14px;
    }

    .chat-msg--user .chat-msg__bubble {
      background: rgba(255, 107, 0, 0.1);
      border-radius: 14px 14px 4px 14px;
    }

    /* Typing indicator bubble */
    .chat-msg--typing .chat-msg__bubble {
      background: rgba(0, 201, 177, 0.08);
      color: #666;
      font-style: italic;
    }

    /* ── Chat input area ─────────────────────────────────────────────── */
    .chat-input-row {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }

    #chat-input {
      flex: 1;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      border: var(--outline);
      border-radius: 14px;
      background: white;
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      resize: none;
      outline: none;
      min-height: 80px;
      max-height: 120px;
      overflow-y: auto;
    }
    #chat-input:focus {
      border-color: var(--blob-teal);
      box-shadow: 3px 3px 0 var(--blob-teal);
    }

    #btn-send {
      align-self: stretch;
    }

    /* ── Quick-reply pills ────────────────────────────────────────────── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .btn-pill {
      background: var(--blob-purple);
      color: white;
      border: 2px solid var(--ink);
      border-radius: 50px;
      font-size: 0.8rem;
      padding: 0.3rem 0.9rem;
      box-shadow: 2px 2px 0 var(--ink);
    }

    /* ── Footer ───────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 0.78rem;
      color: #666;
      margin-top: 2rem;
    }
    footer a {
      color: var(--blob-purple);
      font-weight: 700;
      text-decoration: underline;
    }

    /* ── Responsive ───────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      #chat-messages { max-height: 45vh; }
      .chat-msg { max-width: 95%; }
      .chat-input-row { flex-direction: column; }
      #btn-send { width: 100%; align-self: auto; }
      #chat-input { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- ── Name prompt overlay ──────────────────────────────────────── -->
  <div id="name-overlay" role="dialog" aria-modal="true" aria-labelledby="overlay-heading">
    <div class="name-card">
      <p class="badge">💬 StoryBoT</p>
      <h2 id="overlay-heading">What's your name?</h2>
      <p>Choose a name before entering the adventure.</p>
      <input
        id="name-input"
        class="name-input"
        type="text"
        maxlength="32"
        placeholder="Your name…"
        autocomplete="off"
        aria-label="Your display name"
      />
      <br />
      <button class="btn" id="btn-set-name" onclick="setName()">Start Chatting →</button>
    </div>
  </div>

  <!-- ── Main page ────────────────────────────────────────────────── -->
  <div class="page-wrapper">

    <!-- ── Header ──────────────────────────────────────────────────── -->
    <header>
      <p class="badge">💬 Web Chat</p>
      <h1>Chat with <span>StoryBoT</span></h1>
      <p class="tagline">Your text adventure, straight from the browser 🎮</p>
    </header>

    <!-- ── Error banner ────────────────────────────────────────────── -->
    <div class="error-banner" id="error-banner" role="alert"></div>

    <!-- ── Chat card ───────────────────────────────────────────────── -->
    <section id="chat-section" class="card" aria-label="Chat window">

      <div class="chat-header">
        <h2>🤖 Adventure Chat</h2>
        <div class="chat-user-info">
          <span>Chatting as</span>
          <span class="chat-username-label" id="display-name">…</span>
          <button class="btn btn-sm" onclick="changeName()">✏️ Change</button>
        </div>
      </div>

      <!-- Messages list -->
      <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

      <!-- Quick-reply pills -->
      <div class="quick-replies" id="quick-replies">
        <button class="btn btn-pill" onclick="quickReply('start')">▶ start</button>
        <button class="btn btn-pill" onclick="quickReply('yes')">✅ yes</button>
        <button class="btn btn-pill" onclick="quickReply('no')">❌ no</button>
        <button class="btn btn-pill" onclick="quickReply('1')">1</button>
        <button class="btn btn-pill" onclick="quickReply('2')">2</button>
        <button class="btn btn-pill" onclick="quickReply('3')">3</button>
      </div>

      <!-- Input row -->
      <div class="chat-input-row">
      <textarea
          id="chat-input"
          rows="1"
          maxlength="500"
          placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
          aria-label="Chat message input"
        ></textarea>
        <button class="btn btn-teal" id="btn-send" onclick="sendMessage()">Send ➤</button>
      </div>

    </section>

    <!-- ── Footer ──────────────────────────────────────────────────── -->
    <footer>
      MCBOT – MeshCore CYOA Story Bot &nbsp;·&nbsp;
      <a href="https://github.com/hostyorkshire/MCBOT" target="_blank" rel="noopener">
        github.com/hostyorkshire/MCBOT
      </a>
    </footer>

  </div><!-- /.page-wrapper -->

  <script>
    // ── Configuration ──────────────────────────────────────────────────
    // Set CHAT_API_BASE to your Cloudflare Tunnel URL if this file is
    // served from a different domain than the bot (e.g. a cPanel website).
    // Example: const CHAT_API_BASE = "https://bot.yourdomain.com";
    // Leave as "" to use the same origin (when served directly from the bot).
    const CHAT_API_BASE = "https://bot.intergalactic.it.com";
    const CHAT_ENDPOINT = CHAT_API_BASE + "/chat";

    // ── localStorage keys ──────────────────────────────────────────────
    const KEY_NAME    = "mcbot_chat_name";
    const KEY_USER_ID = "mcbot_chat_user_id";

    // ── State ──────────────────────────────────────────────────────────
    let userName = "";
    let userId   = "";
    let sending  = false;

    // ── Initialise ─────────────────────────────────────────────────────
    function init() {
      userName = localStorage.getItem(KEY_NAME) || "";
      userId   = localStorage.getItem(KEY_USER_ID) || "";

      // Generate a stable UUID for this browser session if absent.
      if (!userId) {
        userId = crypto.randomUUID();
        localStorage.setItem(KEY_USER_ID, userId);
      }

      if (userName.trim()) {
        showChat();
      } else {
        document.getElementById("name-overlay").classList.remove("hidden");
        document.getElementById("name-input").focus();
      }

      // Allow pressing Enter in the name input to confirm.
      document.getElementById("name-input").addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); setName(); }
      });

      // Allow Enter (without Shift) to send, Shift+Enter for newline.
      document.getElementById("chat-input").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
    }

    // ── Set name and reveal chat ────────────────────────────────────────
    function setName() {
      const input = document.getElementById("name-input");
      const name = input.value.trim();
      if (!name) {
        input.focus();
        input.style.borderColor = "var(--blob-pink)";
        return;
      }
      input.style.borderColor = "";
      userName = name;
      localStorage.setItem(KEY_NAME, userName);
      document.getElementById("name-overlay").classList.add("hidden");
      showChat();
    }

    // ── Allow user to change their display name ─────────────────────────
    function changeName() {
      const overlay = document.getElementById("name-overlay");
      const nameInput = document.getElementById("name-input");
      nameInput.value = userName;
      overlay.classList.remove("hidden");
      nameInput.focus();
      nameInput.select();
    }

    // ── Reveal and initialise the chat UI ──────────────────────────────
    function showChat() {
      document.getElementById("display-name").textContent = userName;
      const section = document.getElementById("chat-section");
      section.classList.add("visible");
      if (!section.dataset.welcomed) {
        section.dataset.welcomed = "1";
        appendBotMessage(
          "👋 Welcome, " + escHtml(userName) + "! I'm StoryBoT.\n\n" +
          "Type 'start' to begin a new adventure, or ask me anything."
        );
      }
      document.getElementById("chat-input").focus();
    }

    // ── Send a message ─────────────────────────────────────────────────
    async function sendMessage() {
      if (sending) return;
      const input   = document.getElementById("chat-input");
      const message = input.value.trim();
      if (!message) return;

      input.value = "";
      input.style.height = "auto";

      hideError();
      appendUserMessage(message);

      const typingId = appendTypingIndicator();
      toggleSending(true);

      try {
        const res = await fetch(CHAT_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, user_id: userId }),
        });

        removeMessage(typingId);

        if (!res.ok) {
          let errMsg = "The bot returned an error (" + res.status + ").";
          try {
            const errBody = await res.json();
            if (errBody && errBody.error) errMsg = errBody.error;
          } catch (_) { /* ignore */ }
          showError(errMsg);
          return;
        }

        const data = await res.json();
        appendBotMessage(data.reply || "(no reply)");
      } catch (err) {
        removeMessage(typingId);
        showError("Could not reach the bot. Check your connection and the API URL.");
        console.error("Chat fetch error:", err);
      } finally {
        toggleSending(false);
        input.focus();
      }
    }

    // ── UI helpers ──────────────────────────────────────────────────────
    let _msgCounter = 0;

    function appendBotMessage(text) {
      const id = "msg-" + (++_msgCounter);
      const messages = document.getElementById("chat-messages");
      const el = document.createElement("div");
      el.className = "chat-msg chat-msg--bot";
      el.id = id;
      el.innerHTML =
        '<div class="chat-msg__label">StoryBoT</div>' +
        '<div class="chat-msg__bubble">' + escHtml(text) + '</div>';
      messages.appendChild(el);
      scrollToBottom();
      return id;
    }

    function appendUserMessage(text) {
      const id = "msg-" + (++_msgCounter);
      const messages = document.getElementById("chat-messages");
      const el = document.createElement("div");
      el.className = "chat-msg chat-msg--user";
      el.id = id;
      el.innerHTML =
        '<div class="chat-msg__label">' + escHtml(userName) + '</div>' +
        '<div class="chat-msg__bubble">' + escHtml(text) + '</div>';
      messages.appendChild(el);
      scrollToBottom();
      return id;
    }

    function appendTypingIndicator() {
      const id = "msg-" + (++_msgCounter);
      const messages = document.getElementById("chat-messages");
      const el = document.createElement("div");
      el.className = "chat-msg chat-msg--bot chat-msg--typing";
      el.id = id;
      el.innerHTML =
        '<div class="chat-msg__label">StoryBoT</div>' +
        '<div class="chat-msg__bubble">StoryBoT is thinking…</div>';
      messages.appendChild(el);
      scrollToBottom();
      return id;
    }

    function removeMessage(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function scrollToBottom() {
      const messages = document.getElementById("chat-messages");
      messages.scrollTop = messages.scrollHeight;
    }

    function toggleSending(state) {
      sending = state;
      document.getElementById("btn-send").disabled  = state;
      document.getElementById("chat-input").disabled = state;
      document.querySelectorAll(".btn-pill").forEach(b => b.disabled = state);
    }

    function quickReply(text) {
      const input = document.getElementById("chat-input");
      input.value = text;
      sendMessage();
    }

    function showError(msg) {
      const banner = document.getElementById("error-banner");
      banner.textContent = "⚠️ " + msg;
      banner.classList.add("visible");
    }

    function hideError() {
      document.getElementById("error-banner").classList.remove("visible");
    }

    // ── Sanitise output to prevent XSS ─────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── Boot ────────────────────────────────────────────────────────────
    init();
  </script>

</body>
</html>
