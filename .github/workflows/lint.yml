name: Lint & Format

on:
  push:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/lint.yml'

jobs:
  ruff:
    name: ruff lint & format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install --quiet "ruff>=0.4.0"

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .
